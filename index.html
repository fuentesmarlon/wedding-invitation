<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Boda del Año | Los Fuentes Montes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Great+Vibes&family=Libre+Baskerville:ital,wght@0,400;1,400;1,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="poster-shell">
    <section class="hero" id="inicio">
      <div class="hero-copy">
        <img class="header-title" src="assets/header-title.png" alt="La Boda del Año. Nos casamos Isa y Marlon. Qué se siente que me gustes tanto. 28 de noviembre 2026. Hotel Tzanjuyú">
      </div>

      <nav class="nav" aria-label="Navegación principal">
        <a href="#historia">Información</a>
        <a href="#asistencia">Confirma tu asistencia</a>
      </nav>
    </section>

    <section class="details" id="historia">
      <article class="detail-card place">
        <a class="detail-image-link" href="https://waze.com/ul/h9fx5vec5w" target="_blank" rel="noopener" aria-label="Abrir ubicación en Waze">
          <img class="detail-image" src="assets/location.png" alt="Lugar: Hotel Tzanjuyú, Panajachel, Sololá">
        </a>
        <span class="mobile-map-hint">Toca para abrir ubicación en Waze</span>
      </article>

      <article class="detail-card timeline" id="itinerario">
        <img class="detail-image" src="assets/timeline.png" alt="Timeline: 3:30 PM ceremonia, 5:00 PM cóctel de bienvenida, 6:00 PM cena, 7:30 PM fiesta">
      </article>

      <article class="detail-card gifts">
        <img class="gifts-image" src="assets/regalos.png" alt="Lista de regalos. Su presencia es nuestro mejor regalo. Si desean obsequiarnos algo, pueden hacerlo aquí:">
        <a href="#" class="button">Ver lista</a>
      </article>

      <article class="detail-card facts">
        <img class="facts-image" src="assets/fun-facts.png" alt="Fun facts de Isa y Marlon">
        <iframe class="spotify-embed" data-testid="embed-iframe" src="https://open.spotify.com/embed/track/25Gp0MpGdvrs4hL1u4L2TF?utm_source=generator" width="100%" height="152" frameborder="0" allowfullscreen allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy" title="Canción de Spotify"></iframe>
      </article>
    </section>

    <section class="rsvp" id="asistencia">
      <img class="ticket ticket-left" src="assets/ticket1.png" alt="" aria-hidden="true">
      <div class="rsvp-copy">
        <h2>Confirma tu asistencia</h2>
        <p>Antes del 1 de octubre de 2026</p>
        <button class="rsvp-button" type="button" data-open-rsvp>Confirmar asistencia</button>
        <p class="contact">¿Dudas? &nbsp; +502 5365-8717 | +502 5710-5691</p>
      </div>
      <img class="ticket ticket-right" src="assets/ticket2.png" alt="" aria-hidden="true">
    </section>
  </main>

  <div class="modal" data-rsvp-modal aria-hidden="true">
    <div class="modal-backdrop" data-close-rsvp></div>
    <form class="rsvp-form" data-rsvp-form>
      <button class="modal-close" type="button" data-close-rsvp aria-label="Cerrar formulario">×</button>
      <h2>Confirma tu asistencia</h2>

      <label>
        Nombre del invitado
        <input type="text" name="guestName" autocomplete="name" required>
      </label>

      <label data-plus-one-field>
        Nombre del/la acompañante
        <input type="text" name="companionName" autocomplete="name">
      </label>

      <label class="checkbox-field" data-children-field>
        <input type="checkbox" name="hasChildren" data-children-checkbox>
        Vienen niños
      </label>

      <label class="children-count" data-children-count data-children-field>
        ¿Cuántos niños?
        <input type="number" name="childrenCount" min="1" step="1" value="1" disabled>
      </label>

      <button class="rsvp-button" type="submit">Enviar confirmación</button>
      <p class="form-message" data-form-message role="status"></p>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
